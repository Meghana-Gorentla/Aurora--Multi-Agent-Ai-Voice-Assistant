<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Personality AI Assistant</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">HISTORY
                    
                </h2>
                <div class="user-input-section">
                    <div class="input-group">
                        <input type="text" id="userIdInput" placeholder="Enter User ID" />
                    </div>
                    <div class="button-group">
                        <button class="btn btn-primary" id="loadSessionsBtn">Load Sessions</button>
                        <button class="btn btn-secondary" id="newChatBtn">New Chat</button>
                    </div>
                </div>
            </div>
            <div class="sessions-container">
                <ul class="sessions-list" id="sessionList">
                    <li style="color: #94a3b8; text-align: center; padding: 20px;">
                        Enter User ID and click "Load Sessions" or "New Chat"
                    </li>
                </ul>
            </div>
        </div>

        <div class="main-content">
            <div class="chat-header">
                <span class="current-session" id="currentSessionId">Current Session: No User ID/Session</span>
                <div class="session-name-container" id="sessionNameContainer">
                    <span class="session-name-display" id="sessionNameDisplay">No Session Selected</span>
                    <div class="session-name-edit">
                        <input type="text" class="session-name-input" id="sessionNameEditInput" placeholder="Session name">
                        <button class="btn-edit" id="sessionNameEditBtn">✓</button>
                    </div>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages"></div>

            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <textarea 
                        id="messageInput" 
                        class="message-input" 
                        placeholder="Type your message or record audio..."
                        rows="1"
                    ></textarea>
                    <button class="record-btn" id="recordBtn">🎤</button>
                    <button class="send-btn" id="sendMessageBtn">→</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=20250324b"></script>
</body>
</html>
